<header class="header">
  <div class="header__inner">

    <a routerLink="/" class="header__logo">Atahar Hossain</a>

    <nav class="header__nav" [class.header__nav--open]="menuOpen()">
      <a routerLink="/" class="header__nav-link" (click)="closeMenu()">Home</a>
      <a routerLink="/imprint" class="header__nav-link" (click)="closeMenu()">Imprint</a>
      <a routerLink="/privacy" class="header__nav-link" (click)="closeMenu()">Privacy</a>
    </nav>

    <div class="header__actions">
      <button class="header__lang-btn" (click)="languageService.toggle()">
        {{ languageService.language() === 'en' ? 'DE' : 'EN' }}
      </button>

      <button
        class="header__burger"
        (click)="toggleMenu()"
        [attr.aria-expanded]="menuOpen()"
        aria-label="Toggle menu"
      >
        <span class="header__burger-line" [class.header__burger-line--open]="menuOpen()"></span>
        <span class="header__burger-line" [class.header__burger-line--open]="menuOpen()"></span>
        <span class="header__burger-line" [class.header__burger-line--open]="menuOpen()"></span>
      </button>
    </div>

  </div>
</header>
