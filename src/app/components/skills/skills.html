<section class="skills" appFadeIn>
  <div class="skills__inner">

    <div class="skills__header">
      <h2 class="skills__heading">{{ content().heading }}</h2>
      <p class="skills__subheading">{{ content().subheading }}</p>
    </div>

    <div class="skills__grid">
      @for (skill of skills; track skill.name) {
        <div class="skills__card">
          <img
            class="skills__icon"
            [src]="skill.icon"
            [alt]="skill.name"
          />
          <span class="skills__name">{{ skill.name }}</span>
        </div>
      }
    </div>

  </div>
</section>
