<section class="skills" appFadeIn>
  <div class="skills__inner">
    <div class="skills__header">
      <h2 class="skills__heading">{{ content().heading }}</h2>
      <p class="skills__subheading">{{ content().subheading }}</p>
    </div>

    <div class="skills__list">
      @for (category of categories; track category.labelEn) {
        <div class="skills__row">
          <div class="skills__category" [style.--category-accent]="category.color">
            <span class="skills__category-icon">{{ category.icon }}</span>
            <span class="skills__category-label">
              {{ language() === 'en' ? category.labelEn : category.labelDe }}
            </span>
          </div>

          <div class="skills__items">
            @for (skill of category.skills; track skill.name) {
              <div class="skills__item" [style.--accent]="skill.accent">
                <span
                  class="skills__item-icon"
                  [style.--icon-url]="'url(' + skill.icon + ')'"
                  aria-hidden="true"
                ></span>
                <span class="skills__item-name">{{ skill.name }}</span>
              </div>
            }
          </div>
        </div>
      }
    </div>
  </div>
</section>
